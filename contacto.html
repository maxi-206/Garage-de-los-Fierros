<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="icono.png" type="image/x-icon">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>

  <body>
    <nav class="navbar">
      <a href="#" class="logo">
        <img src="icono.png" alt="Logo Empresa" />
      </a>

      <input type="checkbox" id="menu-toggle" class="menu-check" />

      <label for="menu-toggle" class="hamburger">
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
      </label>

      <ul class="navegacion-links">
        <li><a href="motos.html">Motos</a></li>
        <li><a href="catalogo.html">Autos</a></li>
        <li><a href="contacto.html">Contáctenos</a></li>
        <li><a href="#otros">Más opciones</a></li>
      </ul>
    </nav>

    <section class="contact-section">
      <h2>Ponte en contacto</h2>
      <p>Elige el medio que prefieras para comunicarte con nosotros.</p>

      <div class="contact-container">
        <a href="tel:+123456789" class="contact-card">
          <i class="fas fa-phone-alt"></i>
          <span>Llamar</span>
          <p>+123 456 789</p>
        </a>

        <a
          href="https://wa.me/123456789"
          target="_blank"
          class="contact-card whatsapp"
        >
          <i class="fab fa-whatsapp"></i>
          <span>WhatsApp</span>
          <p>Chat en vivo</p>
        </a>

        <a href="mailto:ejemplo@gmail.com" class="contact-card email">
          <i class="far fa-envelope"></i>
          <span>Email</span>
          <p>ejemplo@gmail.com</p>
        </a>

        <a
          href="https://instagram.com/tuusuario"
          target="_blank"
          class="contact-card social"
        >
          <i class="fab fa-instagram"></i>
          <span>Instagram</span>
          <p>@tuusuario</p>
        </a>
      </div>
    </section>
  </body>
</html>
